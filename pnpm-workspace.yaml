packages:
  - ./
  - playground/

allowBuilds:
  '@alanscodelog/eslint-config': false
  '@alanscodelog/tsconfigs': false
  '@parcel/watcher': false
  electron: false
  esbuild: true
  unrs-resolver: false

allowUnusedPatches: true

catalog:
  '@alanscodelog/eslint-config': ^6.3.1
  '@alanscodelog/semantic-release-config': ^6.0.2
  '@alanscodelog/tsconfigs': ^6.3.0
  '@alanscodelog/utils': ^6.2.0
  '@nuxt/eslint-config': ^1.15.2
  '@nuxt/kit': ^4.3.1
  '@nuxt/module-builder': ^1.0.2
  '@nuxt/schema': ^4.3.1
  '@nuxt/test-utils': ^3.19.2
  changelogen: ^0.6.2
  electron: ^34.5.8
  eslint: ^9.34.0
  husky: ^9.1.7
  nuxt: ^4.2.1
  pino: ^9.9.0
  pino-pretty: ^11.3.0
  semantic-release: ^25.0.3
  typescript: ^5.9.3
  vitest: ^3.2.4
  vue-tsc: ^3.2.5

patchedDependencies:
  '@nuxt/module-builder': patches/@nuxt__module-builder.patch

settings:
  catalogMode: strict
  cleanupUnusedCatalogs: false
shamefullyHoist: true
strictPeerDependencies: false
